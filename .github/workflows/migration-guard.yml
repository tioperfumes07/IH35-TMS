name: Migration Rename/Edit Guard

# Accepts both filename formats:
#   - Legacy 4-digit sequence: 0001_name.sql, 0001a_name.sql
#   - New 12-digit UTC timestamp: 20260607_120000_name.sql
# Both formats are immutable once applied. New migrations MUST use the
# timestamp format to prevent parallel-lane sequence collisions.

on:
  pull_request:
    paths:
      - "db/migrations/**"
      - ".applied-migrations.json"
      - "db/migrations/.ledger.json"

jobs:
  migration-guard:
    name: Reject renamed or edited applied migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Check for changes to applied migrations
        run: node scripts/ci-migration-guard.mjs
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}

      # BLOCK-RELIABILITY-07 — anti-RAISE lint. Self-test BLOCKS (unit test of the lint);
      # the migration scan is ADVISORY until MIGRATION_RAISE_LINT_ENFORCE is flipped on
      # (codebase is currently 0 dangerous raise-on-absence, so the flip is safe when ready).
      - name: Anti-RAISE lint self-test (blocking)
        run: node scripts/verify-migration-no-runtime-raise.mjs --selftest

      - name: Anti-RAISE lint scan (advisory)
        run: node scripts/verify-migration-no-runtime-raise.mjs

      # Grant-gap guard (same family that broke the events spine). Advisory/warning-only today.
      # FOLLOW-UP: add `events` (and ideally all schemas) to the watchlist + make it cross-file
      # aware so a future missing USAGE/SELECT grant is caught BEFORE deploy, not after.
      - name: Schema USAGE-grant guard (advisory)
        run: node scripts/verify-schema-usage-grants.mjs

      - name: Reject new 4-digit sequence migrations
        run: |
          NEW_LEGACY=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD -- db/migrations/ \
            | grep -E '^db/migrations/[0-9]{4}[a-z]?_.+\.sql$' || true)
          if [ -n "$NEW_LEGACY" ]; then
            echo "MIGRATION FORMAT ERROR: New migrations must use the timestamp format (20260607_120000_name.sql)."
            echo "Legacy 4-digit sequence names are frozen. Found new legacy-format file(s):"
            echo "$NEW_LEGACY"
            exit 1
          fi
          echo "migration-format-guard PASS — no new legacy-format migrations detected."
