name: pass-8-smoke-verify

on:
  pull_request:
    paths:
      - "docs/audits/PASS-8-PRE-PROD-SMOKE-RESULTS.*"
      - "scripts/pass-8-*.mjs"
      - "scripts/verify-pass-8-clean-baseline.mjs"
      - ".github/workflows/pass-8-smoke-verify.yml"
      - "package.json"
  workflow_dispatch:

jobs:
  pass-8:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Frontend build (match Render)
        run: cd apps/frontend && npm run build

      - name: Driver PWA build (match Render)
        run: npm run build:driver-pwa

      - name: Build
        run: npm run build

      - name: Run PASS-8 orchestrator
        run: npm run verify:pass-8-smoke

      - name: Verify PASS-8 clean baseline
        run: npm run verify:pass-8-clean-baseline

      - name: Upload PASS-8 results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pass-8-results
          path: |
            docs/audits/PASS-8-PRE-PROD-SMOKE-RESULTS.json
            docs/audits/PASS-8-PRE-PROD-SMOKE-RESULTS.md
          if-no-files-found: error
