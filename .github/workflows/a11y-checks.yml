name: a11y-checks

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/frontend/src/**"
      - "scripts/a11y-*.mjs"
      - "scripts/verify-a11y-no-critical-violations.mjs"
      - ".github/workflows/a11y-checks.yml"
  schedule:
    - cron: "0 8 * * 1"

jobs:
  a11y-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      A11Y_OUT_DIR: ${{ github.workspace }}/.a11y-out

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: axe-core walk (18 modules + 8 detail pages)
        run: npm run a11y:axe-walk

      - name: Keyboard navigation walk (5 critical workflows)
        run: npm run a11y:keyboard-nav

      - name: Color contrast verification
        run: npm run a11y:color-contrast

      - name: Screen reader static checks
        run: npm run a11y:screen-reader-checks

      - name: CI guard — no new critical/serious a11y violations
        run: npm run verify:a11y-no-critical-violations
