name: pass-7-smoke-verify

on:
  schedule:
    - cron: "0 8 * * *"
  pull_request:
    paths:
      - "apps/frontend/**"
      - "scripts/verify-audit-fix-*.mjs"
      - "scripts/run-pass-7-smoke-verify.mjs"
  workflow_dispatch:

jobs:
  pass-7:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run PASS-7 smoke verification
        env:
          PASS7_WRITE_RESULTS: "1"
        run: npm run verify:pass-7-smoke

      - name: Upload PASS-7 results artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pass-7-results
          path: docs/audits/PASS-7-RESULTS-2026-06-05.md
          if-no-files-found: ignore
