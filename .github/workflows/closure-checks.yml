name: closure-checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lucia-bypass-guard-pattern:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify luciaBypass guard pattern
        run: node scripts/verify-lucia-bypass-guard-pattern.mjs
