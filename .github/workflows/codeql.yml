name: CodeQL Security Scan

# GitHub's native SAST (static application security testing). Scans the WHOLE TS/JS codebase for
# security vulnerabilities (injection, auth flaws, unsafe data flow, secrets-in-code) — retroactively
# on the existing code AND on every PR. Findings surface in the repo's Security tab.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1' # weekly full scan, Mondays 07:00 UTC

jobs:
  analyze:
    name: CodeQL Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-extended adds deeper security queries beyond the default set.
          queries: security-extended
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
