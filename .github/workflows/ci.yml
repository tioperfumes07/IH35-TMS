name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify architectural design alignment
        run: npm run verify:arch-design

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend build (match Render)
        run: cd apps/frontend && npm run build

      - name: Build
        run: npm run build
