name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ih35_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ih35_test
      DATABASE_DIRECT_URL: postgres://postgres:postgres@localhost:5432/ih35_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static checks — canonical renamed tables (no stale safety.fines refs)
        run: npm run verify:canonical-schema-names

      - name: Migrate database (integration tests)
        run: npm run db:migrate

      - name: Backend tests + coverage gates
        run: npm run test:coverage

      - name: Verify architectural design alignment
        run: npm run verify:arch-design

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend build (match Render)
        run: cd apps/frontend && npm run build

      - name: Build
        run: npm run build
