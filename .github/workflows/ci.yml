name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-branch-fresh:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify PR branch freshness
        run: npm run verify:branch-fresh

  build-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: verify
          POSTGRES_PASSWORD: verify
          POSTGRES_DB: ih35_verify
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U verify"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://verify:verify@localhost:54329/ih35_verify
      DATABASE_DIRECT_URL: postgres://verify:verify@localhost:54329/ih35_verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verification source of truth (local + CI parity)
        run: npm run verify:pre-commit

      - name: Verify accounting autoload coverage (src + dist)
        run: npm run verify:accounting-autoload-coverage

      - name: Migration application consistency guard
        run: npm run verify:migration-application-consistency

      - name: Backend tests + coverage (CI strict)
        run: npm run test:coverage

      - name: Frontend build (match Render)
        run: cd apps/frontend && npm run build

      - name: Build
        run: npm run build

      - name: Verify no duplicate routes (static)
        run: npm run verify:no-duplicate-routes

      - name: Verify QBO webhook fail-closed contract
        run: npm run verify:qbo-webhook-fail-closed

      - name: Verify no boot-time env throws
        run: npm run verify:no-boot-throwing-env-checks

      - name: Boot smoke — compiled dist/index.js must answer /api/v1/health
        run: npm run ci:boot-api-smoke

      - name: Accounting endpoints smoke — 12 endpoints (6 JSON + 6 XLSX)
        env:
          IH35_TEST_AUTH_BYPASS: "1"
        run: npm run smoke:accounting
