name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-branch-fresh:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify PR branch freshness
        run: npm run verify:branch-fresh

  build-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: verify
          POSTGRES_PASSWORD: verify
          POSTGRES_DB: ih35_verify
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U verify"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://verify:verify@localhost:54329/ih35_verify
      DATABASE_DIRECT_URL: postgres://verify:verify@localhost:54329/ih35_verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verification source of truth (local + CI parity)
        run: npm run verify:pre-commit

      - name: Verify accounting autoload coverage (src + dist)
        run: npm run verify:accounting-autoload-coverage

      - name: Migration application consistency guard
        run: npm run verify:migration-application-consistency

      - name: Verify content drift check
        run: npm run verify:content-drift-check

      - name: Verify applied migrations immutable
        run: npm run verify:applied-migrations-immutable

      - name: Verify maintenance routes bootstrapped
        run: npm run verify:maintenance-routes-bootstrapped

      - name: Verify maintenance tab coverage
        run: npm run verify:maintenance-tab-coverage

      - name: Verify master-data write routes
        run: npm run verify:master-data-write-routes

      - name: Verify CSV import gating for projected entities
        run: npm run verify:csv-import-gated-for-projected-entities

      - name: Verify master data write routes guard
