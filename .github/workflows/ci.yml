name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-branch-fresh:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify PR branch freshness
        run: npm run verify:branch-fresh

  build-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: verify
          POSTGRES_PASSWORD: verify
          POSTGRES_DB: ih35_verify
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U verify"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://verify:verify@localhost:54329/ih35_verify
      DATABASE_DIRECT_URL: postgres://verify:verify@localhost:54329/ih35_verify

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verification source of truth (local + CI parity)
        run: npm run verify:pre-commit

      - name: Verify accounting autoload coverage (src + dist)
        run: npm run verify:accounting-autoload-coverage

      - name: Verify expenses cents spine + void-not-delete (GAP-EXPENSES Phase 1)
        run: npm run verify:expenses-cents-void

      - name: Verify expenses list is read-only + entity-scoped (GAP-EXPENSES browse)
        run: npm run verify:expenses-list-readonly

      - name: Verify expense balance invariant (GAP-EXPENSES Phase 1.5)
        run: npm run verify:expense-balance-invariant

      - name: Verify uncategorized-expense seed (GAP-EXPENSES Phase 2 Step 2)
        run: npm run verify:uncategorized-expense-seed

      - name: Verify CHAIN-03 single bill resolver (draft preview == poster)
        run: npm run verify:bill-resolver-single-source

      - name: Verify CHAIN-04 bill-payment poster (real-bank ledger, ap_control, bill-first, flag OFF)
        run: npm run verify:bill-payment-posting-uses-resolver

      - name: Verify CHAIN-05 bank-feed GL posting (categorize→post behind BANK_FEED_GL_POSTING_ENABLED, flag OFF)
        run: npm run verify:bank-feed-gl-posting

      - name: Verify bank-recon variance poster reads ledger_account_id (not phantom coa_account_id)
        run: npm run verify:bank-recon-poster-ledger-account-id

      - name: Verify bank-recon expense-match Part 2a (expense persistable, bill not; posted+idempotency guards)
        run: npm run verify:bank-recon-expense-match-part2a

      - name: Verify bank-recon Confirm-match exact-only (BANKREC-CONFIRM-01; bill + variance held)
