name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-branch-fresh:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify PR branch freshness
        run: npm run verify:branch-fresh

  build-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: verify
          POSTGRES_PASSWORD: verify
          POSTGRES_DB: ih35_verify
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U verify"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://verify:verify@localhost:54329/ih35_verify
      DATABASE_DIRECT_URL: postgres://verify:verify@localhost:54329/ih35_verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verification source of truth (local + CI parity)
        run: npm run verify:pre-commit

      - name: Verify accounting autoload coverage (src + dist)
        run: npm run verify:accounting-autoload-coverage

      - name: Migration application consistency guard
        run: npm run verify:migration-application-consistency

      - name: Verify content drift check
        run: npm run verify:content-drift-check

      - name: Verify applied migrations immutable
        run: npm run verify:applied-migrations-immutable

      - name: Verify maintenance routes bootstrapped
        run: npm run verify:maintenance-routes-bootstrapped

      - name: Verify maintenance tab coverage
        run: npm run verify:maintenance-tab-coverage

      - name: Verify master-data write routes
        run: npm run verify:master-data-write-routes

      - name: Verify CSV import gating for projected entities
        run: npm run verify:csv-import-gated-for-projected-entities

      - name: Verify master data write routes guard
        run: npm run verify:master-data-write-routes

      - name: Verify projected entity CSV import gating
        run: npm run verify:csv-import-gated-for-projected-entities
      - name: Verify safety tab coverage
        run: npm run verify:safety-tab-coverage

      - name: Verify safety driver DQF contract
        run: npm run verify:safety-driver-dqf

      - name: Verify ELD foundation coverage
        run: npm run verify:eld-foundation-coverage

      - name: Verify safety random pool determinism
        run: npm run verify:safety-random-pool-determinism

      - name: Verify SAF drug program contract
        run: npm run verify:drug-program

      - name: Verify SAF RTD state machine contract
        run: npm run verify:rtd-statemachine

      - name: Verify safety reports coverage
        run: npm run verify:safety-reports-coverage

      - name: Verify safety medical cards contract
        run: npm run verify:safety-medical-cards

      - name: Verify safety reminders contract
        run: npm run verify:safety-reminders

      - name: Verify PM due-soon calculation guard
        run: npm run verify:pm-due-soon-calculation

      - name: Verify maint parts + PM due contract
        run: npm run verify:maint-pm

      - name: Verify insurance policy schema contract
        run: npm run verify:insurance-schema

      - name: Verify maintenance reports coverage guard
        run: npm run verify:maintenance-reports-coverage

      - name: Verify no demo rows in safety surfaces
        run: npm run verify:no-demo-rows-in-safety

      - name: Verify notes do not expose internal payloads
        run: npm run verify:no-internal-payload-in-notes

      - name: Verify route aliases have canonical targets
        run: npm run verify:no-orphan-route-aliases

      - name: Backend tests + coverage (CI strict)
        run: npm run test:coverage

      - name: Frontend build (match Render)
        run: cd apps/frontend && npm run build

      - name: Build
        run: npm run build

      - name: Verify no duplicate routes (static)
        run: npm run verify:no-duplicate-routes

      - name: Verify QBO webhook fail-closed contract
        run: npm run verify:qbo-webhook-fail-closed

      - name: Verify no boot-time env throws
        run: npm run verify:no-boot-throwing-env-checks

      - name: Verify Google OAuth lazy env guard
        run: npm run verify:google-oauth-lazy-env

      - name: Verify no duplicate modal headers
        run: npm run verify:no-duplicate-modal-headers

      - name: Verify no stub strings
        run: npm run verify:no-stub-strings

      - name: Verify no seed-data fixture imports in prod path
        run: npm run verify:no-seed-data-in-prod-fixtures

      - name: Verify sidebar routes resolve to real pages
        run: npm run verify:sidebar-route-resolution

      - name: Verify no internal user-facing strings
        run: npm run verify:no-internal-strings

      - name: Verify docs tenant scope
        run: npm run verify:docs-tenant-scope

      - name: Verify docs routes bootstrapped
        run: npm run verify:docs-routes-bootstrapped

      - name: Verify asset registry contract
        run: npm run verify:asset-registry

      - name: Verify allocation integrity contract
        run: npm run verify:allocation-integrity

      - name: Verify PSE mirror contract
        run: npm run verify:pse-mirror

      - name: Verify PSE enforcement contract
        run: npm run verify:pse-enforce

      - name: Verify bank bulk contract
        run: npm run verify:bank-bulk

      - name: Verify tail cosmetic internal string guard
        run: npm run verify:tail-cosmetic-no-internal-string

      - name: Verify no qbo_archive runtime reads
        run: npm run verify:no-qbo-archive-runtime-reads

      - name: Verify mdata routes are local-first
        run: npm run verify:mdata-routes-local-first

      - name: verify:vehicle-profile-sections-complete
        run: npm run verify:vehicle-profile-sections-complete

      - name: verify:vehicle-profile-plates-multi-jurisdiction
        run: npm run verify:vehicle-profile-plates-multi-jurisdiction

      - name: verify:vehicle-profile-driver-dual-tracking
        run: npm run verify:vehicle-profile-driver-dual-tracking

      - name: verify:vehicle-profile-audit-coverage
        run: npm run verify:vehicle-profile-audit-coverage

      - name: verify:vehicle-profile-part2-sections-complete
        run: npm run verify:vehicle-profile-part2-sections-complete

      - name: verify:vehicle-profile-financial-aggregation-pattern
        run: npm run verify:vehicle-profile-financial-aggregation-pattern

      - name: verify:vehicle-profile-pdf-export-puppeteer
        run: npm run verify:vehicle-profile-pdf-export-puppeteer

      - name: verify:vehicle-profile-photos-documents-pattern
        run: npm run verify:vehicle-profile-photos-documents-pattern

      - name: Verify qbo master write route contract
        run: npm run verify:qbo-master-write-contract
      - name: Verify integrity anomaly tenant scope
        run: npm run verify:integrity-anomaly-tenant-scope

      - name: Verify driver repair guard
        run: npm run verify:driver-repair-guard

      - name: Boot smoke — compiled dist/index.js must answer /api/v1/health
        run: npm run ci:boot-api-smoke

      - name: Boot aggregate smoke — unit GET must return aggregate envelope
        env:
          IH35_TEST_AUTH_BYPASS: "1"
        run: npm run ci:boot-aggregate-smoke

      - name: Accounting endpoints smoke — 12 endpoints (6 JSON + 6 XLSX)
        env:
          IH35_TEST_AUTH_BYPASS: "1"
        run: npm run smoke:accounting
