name: Canary Smoke Tests

on:
  push:
    branches: [main]

concurrency:
  group: canary-smoke-${{ github.sha }}
  cancel-in-progress: false

jobs:
  canary-smoke:
    name: Canary Preview Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Wait for Render preview deploy
        # Render typically deploys within 2-4 minutes of push
        run: sleep 180

      - name: Health check (preview)
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --retry 5 --retry-delay 15 --retry-connrefused \
            "${{ vars.PREVIEW_BASE_URL }}/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed: HTTP $STATUS"

      - name: Auth smoke test (preview)
        id: auth
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ vars.PREVIEW_BASE_URL }}/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"${{ secrets.SMOKE_TEST_EMAIL }}","password":"${{ secrets.SMOKE_TEST_PASSWORD }}"}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Auth smoke failed: HTTP $HTTP_CODE"
            echo "Body: $BODY"
            exit 1
          fi
          TOKEN=$(echo "$BODY" | jq -r '.token // .data.token // empty')
          if [ -z "$TOKEN" ]; then
            echo "No token in auth response"
            exit 1
          fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "Auth smoke passed"

      - name: Loads list smoke test (preview)
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            "${{ vars.PREVIEW_BASE_URL }}/api/v1/loads?operating_company_id=${{ secrets.SMOKE_TEST_COMPANY_ID }}&limit=1")
          if [ "$STATUS" != "200" ]; then
            echo "Loads list smoke failed: HTTP $STATUS"
            exit 1
          fi
          echo "Loads list smoke passed"

      - name: Drivers list smoke test (preview)
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            "${{ vars.PREVIEW_BASE_URL }}/api/v1/drivers?operating_company_id=${{ secrets.SMOKE_TEST_COMPANY_ID }}&limit=1")
          if [ "$STATUS" != "200" ]; then
            echo "Drivers list smoke failed: HTTP $STATUS"
            exit 1
          fi
          echo "Drivers list smoke passed"

      - name: Watch window — wait for Sentry spike detection
        run: |
          echo "Canary watch window: 15 minutes"
          echo "If Sentry fires an alert, cancel this run manually or let auto-rollback trigger."
          # In a real setup, poll Sentry API for error rate here.
          # For now: sleep 5 min as a minimal gate (full 15 min watch is manual via Sentry dashboard).
          sleep 300
          echo "Watch window passed — no automated Sentry spike detected"

      - name: Promote to production
        if: success()
        run: |
          echo "All canary smoke tests passed. Triggering production deploy..."
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}/deploys"
          echo "Production deploy triggered"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Canary smoke FAILED. Triggering rollback..."
          # Get previous successful deploy
          PREV=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_PREVIEW_SERVICE_ID }}/deploys?limit=5" \
            | jq -r '[.[] | select(.deploy.status == "live")][1].deploy.id // empty')
          if [ -n "$PREV" ]; then
            echo "Rolling back to deploy: $PREV"
            # Render doesn't have a direct rollback API; re-deploy previous commit is the approach
            echo "Manual rollback needed: go to Render dashboard and redeploy previous commit"
          fi
          exit 1
