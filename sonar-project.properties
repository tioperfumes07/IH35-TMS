# SonarCloud — the "outside auditor" dashboard: bugs, logic smells, security hotspots, duplicated
# code, and test coverage, with a pass/fail Quality Gate on every PR.
#
# ACTIVATION (one-time, owner):
#   1. Sign in at https://sonarcloud.io with your GitHub account and import the IH35-TMS repo.
#   2. Copy the project key + organization key SonarCloud shows you into the two lines below.
#   3. Add the generated token as a repo secret named SONAR_TOKEN (Settings → Secrets → Actions).
# Until SONAR_TOKEN exists, the Sonar workflow skips cleanly (no broken CI).

sonar.projectKey=REPLACE_ME_project_key
sonar.organization=REPLACE_ME_org_key

sonar.sources=apps
sonar.tests=apps
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts
sonar.exclusions=**/dist/**,**/node_modules/**,**/*.min.js,**/coverage/**
sonar.javascript.lcov.reportPaths=apps/backend/coverage/lcov.info,apps/frontend/coverage/lcov.info
sonar.sourceEncoding=UTF-8
