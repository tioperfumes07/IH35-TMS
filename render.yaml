previews:
  generation: automatic

services:
  - type: web
    name: ih35-tms-backend
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build:backend
    preDeployCommand: npm run db:migrate && npm run db:verify:critical-runtime && npm run ci:boot-api-smoke && IH35_TEST_AUTH_BYPASS=1 npm run ci:boot-aggregate-smoke
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22

  - type: static
    name: ih35-tms-frontend
    buildCommand: cd apps/frontend && npm install && npm run build
    staticPublishPath: apps/frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.ih35dispatch.com
    headers:
      # Hashed build assets — filenames change per build, so cache them forever (first match wins).
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
      # The app shell (index.html) + every SPA fallback route — NO s-maxage, so Cloudflare can't hold a
      # stale HTML shell for 5 min after a deploy (that caused "fixed but looks stale" reports). Must
      # revalidate every load so a new deploy is visible immediately. The hashed /assets/* above keep
      # their long immutable cache (filenames change per build, so they're always safe).
      - path: /*
        name: Cache-Control
        value: "public, max-age=0, must-revalidate"

  - type: static
    name: ih35-tms-driver
    buildCommand: npm install && npm run build:driver-pwa
    staticPublishPath: apps/driver-pwa/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.ih35dispatch.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: cron
    name: loves-card-import
    runtime: node
    schedule: "0 6 * * *"
    buildCommand: npm install && npm run build:backend
    startCommand: node dist/sync/run-loves-card-import.js
    envVars:
      - key: NODE_VERSION
        value: 22
