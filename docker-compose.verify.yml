services:
  postgres-verify:
    image: postgres:16-alpine
    container_name: ih35-tms-verify-db
    environment:
      POSTGRES_USER: verify
      POSTGRES_PASSWORD: verify
      POSTGRES_DB: ih35_verify
    ports:
      - "54329:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verify"]
      interval: 1s
      timeout: 3s
      retries: 10
